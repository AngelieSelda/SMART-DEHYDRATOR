<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dehydrator | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .lcd-font { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-tighter text-slate-800 uppercase">MinSU <span class="text-blue-600">Dehydrator</span></h1>
            <div id="status-badge" class="text-[10px] font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-400 uppercase tracking-widest transition-all">Connecting...</div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="bg-slate-900 p-6 rounded-[2.5rem] shadow-2xl border-8 border-slate-800 relative">
            <div class="lcd-font text-green-400 space-y-2">
                <div class="flex justify-between text-[10px] uppercase tracking-widest opacity-60">
                    <span id="lcd-state">System Online</span>
                    <span id="lcd-mode">IDLE</span>
                </div>
                <div class="flex justify-between items-baseline py-2">
                    <h2 id="lcd-temp" class="text-5xl font-bold italic">--°C</h2>
                    <p id="lcd-hum" class="text-2xl font-semibold opacity-80">--%</p>
                </div>
                <div class="flex justify-between border-t border-green-900/50 pt-3 text-sm">
                    <span class="uppercase">Time Left:</span>
                    <span id="lcd-time" class="tracking-widest">00:00:00</span>
                </div>
            </div>
            <div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent pointer-events-none rounded-[2.5rem]"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div id="ind-heater" class="bg-white p-4 rounded-3xl border border-slate-200 text-center transition-all">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Heater Unit</p>
                <p id="txt-heater" class="text-sm font-extrabold text-slate-300 uppercase">Inactive</p>
            </div>
            <div id="ind-blower" class="bg-white p-4 rounded-3xl border border-slate-200 text-center transition-all">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Blower Fan</p>
                <p id="txt-blower" class="text-sm font-extrabold text-slate-300 uppercase">Stopped</p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 space-y-8">
            <div class="space-y-4">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] text-center">Execution Controls</p>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="triggerAction('SELECT')" class="py-8 bg-blue-600 hover:bg-blue-700 text-white rounded-3xl font-black text-lg shadow-xl shadow-blue-100 active:scale-95 transition-all uppercase tracking-widest">
                        Select
                    </button>
                    <button onclick="triggerAction('CANCEL')" class="py-8 bg-rose-500 hover:bg-rose-600 text-white rounded-3xl font-black text-lg shadow-xl shadow-rose-100 active:scale-95 transition-all uppercase tracking-widest">
                        Cancel
                    </button>
                </div>
            </div>

            <div class="space-y-4">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] text-center">Fruit Presets</p>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="triggerPreset('MANGO', 57, 12)" class="p-4 bg-slate-50 hover:bg-orange-50 hover:text-orange-600 rounded-2xl font-bold text-xs transition-all border border-transparent hover:border-orange-200 uppercase">Mango</button>
                    <button onclick="triggerPreset('APPLE', 57, 10)" class="p-4 bg-slate-50 hover:bg-red-50 hover:text-red-600 rounded-2xl font-bold text-xs transition-all border border-transparent hover:border-red-200 uppercase">Apple</button>
                    <button onclick="triggerPreset('BANANA', 57, 14)" class="p-4 bg-slate-50 hover:bg-yellow-50 hover:text-yellow-700 rounded-2xl font-bold text-xs transition-all border border-transparent hover:border-yellow-200 uppercase">Banana</button>
                    <button onclick="triggerPreset('ORANGE', 57, 15)" class="p-4 bg-slate-50 hover:bg-orange-50 hover:text-orange-700 rounded-2xl font-bold text-xs transition-all border border-transparent hover:border-orange-200 uppercase">Orange</button>
                    <button onclick="triggerPreset('GRAPES', 57, 30)" class="p-4 bg-slate-50 hover:bg-purple-50 hover:text-purple-600 rounded-2xl font-bold text-xs transition-all border border-transparent hover:border-purple-200 uppercase">Grapes</button>
                    <button onclick="triggerAction('RESET')" class="p-4 bg-slate-800 text-white rounded-2xl font-bold text-xs hover:bg-black transition-all uppercase">Reset</button>
                </div>
            </div>
        </div>

        <p class="text-[10px] text-center text-slate-400 font-medium pb-8 uppercase tracking-widest">Smart Dehydrator v2.0 | BSIT 2-F2</p>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration (Galing sa setup mo)
        const firebaseConfig = {
            apiKey: "AIzaSyAXz_c7gNjyzKXuPLTU1d-nRU3aSHslGOA",
            authDomain: "smart-dehydrator-final.firebaseapp.com",
            projectId: "smart-dehydrator-final",
            appId: "1:1022324071985:web:41ace6ee171ee0edcc3f10"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. MONITORING: Kuha ng data mula sa ESP32
        onSnapshot(doc(db, "dehydrator", "status"), (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                
                // Update LCD texts
                document.getElementById('lcd-temp').innerText = `${d.temperature}°C`;
                document.getElementById('lcd-hum').innerText = `${d.humidity}%`;
                document.getElementById('lcd-mode').innerText = d.mode;
                document.getElementById('lcd-time').innerText = d.remaining_time;
                document.getElementById('lcd-state').innerText = d.mode === 'IDLE' ? 'System Ready' : 'Drying in Progress';

                // Update Heater Indicator
                const isHeaterOn = d.heater1 || d.heater2;
                const heatBox = document.getElementById('ind-heater');
                const heatTxt = document.getElementById('txt-heater');
                heatBox.className = isHeaterOn ? "bg-orange-50 p-4 rounded-3xl border border-orange-200 text-center scale-105 transition-all shadow-lg shadow-orange-100" : "bg-white p-4 rounded-3xl border border-slate-200 text-center transition-all";
                heatTxt.className = isHeaterOn ? "text-sm font-extrabold text-orange-600 uppercase animate-pulse" : "text-sm font-extrabold text-slate-300 uppercase";
                heatTxt.innerText = isHeaterOn ? "Active" : "Inactive";

                // Update Blower Indicator
                const isBlowerOn = d.blower > 0;
                const blowBox = document.getElementById('ind-blower');
                const blowTxt = document.getElementById('txt-blower');
                blowBox.className = isBlowerOn ? "bg-green-50 p-4 rounded-3xl border border-green-200 text-center scale-105 transition-all shadow-lg shadow-green-100" : "bg-white p-4 rounded-3xl border border-slate-200 text-center transition-all";
                blowTxt.className = isBlowerOn ? "text-sm font-extrabold text-green-600 uppercase animate-bounce" : "text-sm font-extrabold text-slate-300 uppercase";
                blowTxt.innerText = isBlowerOn ? "Running" : "Stopped";

                // Connection Badge
                const badge = document.getElementById('status-badge');
                badge.innerText = "Online";
                badge.className = "text-[10px] font-bold px-3 py-1 rounded-full bg-green-100 text-green-600 uppercase tracking-widest";
            }
        });

        // 2. CONTROL: Mag-send ng Commands sa ESP32
        window.triggerAction = async (act) => {
            try {
                await setDoc(doc(db, "dehydrator", "commands"), {
                    action: act,
                    timestamp: new Date().toISOString()
                });
                console.log("Action Sent:", act);
            } catch (e) { alert("Error sending command: " + e.message); }
        };

        window.triggerPreset = async (fruit, temp, hrs) => {
            try {
                await setDoc(doc(db, "dehydrator", "commands"), {
                    action: "SELECT",
                    preset: fruit,
                    targetTemp: temp,
                    targetTimeHrs: hrs,
                    targetTimeMins: 0,
                    timestamp: new Date().toISOString()
                });
                alert(`${fruit} command sent! Check device.`);
            } catch (e) { alert("Error: " + e.message); }
        };

    </script>
</body>
</html>
